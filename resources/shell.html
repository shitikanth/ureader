<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ureader</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
#content-frame { display: block; width: 100%; height: 100%; border: none; }
</style>
</head>
<body>
<iframe id="content-frame" src="about:blank" sandbox="allow-same-origin allow-scripts"></iframe>
<script>
function injectObserver(iframe, tocAnchors) {
  if (!tocAnchors || !tocAnchors.length) return;
  var doc = iframe.contentDocument;
  if (!doc) return;
  var win = iframe.contentWindow;
  if (!win) return;
  var targets = tocAnchors
    .map(function(a) { return { el: doc.getElementById(a.id), tocIndex: a.tocIndex }; })
    .filter(function(a) { return !!a.el; });
  if (!targets.length) return;

  // Active section = the anchor whose top has most recently passed a threshold
  // line near the top of the viewport. Updates only fire after the user actually
  // scrolls — so clicking a parent entry doesn't immediately jump selection to
  // the first subsection that happens to sit at the top of the page.
  var lastReportedIndex = -1;
  var userHasScrolled = false;
  var rafQueued = false;
  var THRESHOLD_PX = 320;

  function check() {
    rafQueued = false;
    if (!userHasScrolled) return;
    var activeIndex = -1;
    var activeTop = -Infinity;
    for (var i = 0; i < targets.length; i++) {
      var top = targets[i].el.getBoundingClientRect().top;
      if (top <= THRESHOLD_PX && top > activeTop) {
        activeTop = top;
        activeIndex = targets[i].tocIndex;
      }
    }
    if (activeIndex >= 0 && activeIndex !== lastReportedIndex) {
      lastReportedIndex = activeIndex;
      window.webkit.messageHandlers.bridge.postMessage(
        { action: 'tocSelectionChanged', tocEntryIndex: activeIndex });
    }
  }

  win.addEventListener('scroll', function() {
    userHasScrolled = true;
    if (!rafQueued) {
      rafQueued = true;
      win.requestAnimationFrame(check);
    }
  }, { passive: true });
}

function loadBook(data) {
  navigateTo({
    url:        data.currentUrl,
    tocAnchors: data.tocAnchors || []
  });
}

function injectOverscroll(iframe) {
  var win = iframe.contentWindow;
  var doc = iframe.contentDocument;
  if (!win || !doc) return;
  var cooldown = false;
  win.addEventListener('wheel', function(e) {
    if (cooldown) return;
    var el = doc.documentElement;
    var atBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 1;
    var atTop = el.scrollTop <= 0;
    if (e.deltaY > 0 && atBottom) {
      cooldown = true;
      window.webkit.messageHandlers.bridge.postMessage({ action: 'nextChapter' });
    } else if (e.deltaY < 0 && atTop) {
      cooldown = true;
      window.webkit.messageHandlers.bridge.postMessage({ action: 'prevChapter' });
    }
  }, { passive: true });
}

function navigateTo(data) {
  var frame = document.getElementById('content-frame');
  frame.src = data.url;
  var anchors = data.tocAnchors || [];
  frame.onload = function() {
    if (data.scrollToEnd) {
      var d = frame.contentDocument.documentElement;
      d.scrollTop = d.scrollHeight;
    }
    injectOverscroll(frame);
    if (anchors.length) injectObserver(frame, anchors);
  };
}

window.webkit.messageHandlers.bridge.postMessage({ action: 'ready' });
</script>
</body>
</html>
