<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ureader</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  background: #111;
  color: #ccc;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 13px;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

#toolbar {
  display: flex;
  align-items: center;
  padding: 0 14px;
  height: 36px;
  background: #161616;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}
#toc-toggle {
  background: none;
  border: none;
  color: #888;
  font-size: 15px;
  cursor: pointer;
  padding: 4px 6px;
  line-height: 1;
}
#toc-toggle:hover { color: #ccc; }
#position {
  flex: 1;
  text-align: center;
  color: #555;
  font-size: 12px;
}

#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#toc-sidebar {
  width: 220px;
  min-width: 220px;
  background: #1a1a1a;
  border-right: 1px solid #222;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.15s ease, min-width 0.15s ease;
}
#toc-sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}
#toc-header {
  padding: 10px 14px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #555;
  border-bottom: 1px solid #222;
  flex-shrink: 0;
}
#toc-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.toc-item {
  padding: 7px 14px;
  color: #777;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background 0.1s;
}
.toc-item:hover { color: #aaa; background: #222; }
.toc-item.active {
  background: #252525;
  color: #e0e0e0;
  border-left: 2px solid #4caf50;
  padding-left: 12px;
}

#content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#content-frame {
  flex: 1;
  border: none;
  width: 100%;
  background: #fff;
}

#nav-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: #161616;
  border-top: 1px solid #222;
  flex-shrink: 0;
}
.nav-btn {
  background: #2a2a2a;
  border: 1px solid #333;
  color: #999;
  padding: 5px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
.nav-btn:hover:not(:disabled) { background: #333; color: #ccc; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }
#book-title { font-size: 11px; color: #444; }
</style>
</head>
<body>

<div id="toolbar">
  <button id="toc-toggle" onclick="toggleToc()">☰</button>
  <span id="position"></span>
</div>

<div id="main">
  <div id="toc-sidebar">
    <div id="toc-header">Contents</div>
    <div id="toc-list"></div>
  </div>
  <div id="content-area">
    <iframe id="content-frame" src="about:blank" sandbox="allow-same-origin allow-scripts"></iframe>
    <div id="nav-footer">
      <button class="nav-btn" id="prev-btn" onclick="doNavigate('prev')">← Prev</button>
      <span id="book-title"></span>
      <button class="nav-btn" id="next-btn" onclick="doNavigate('next')">Next →</button>
    </div>
  </div>
</div>

<script>
var _toc = [];
var _spineCount = 0;
var _currentIndex = 0;

function toggleToc() {
  document.getElementById('toc-sidebar').classList.toggle('collapsed');
}

function doNavigate(direction) {
  window.webkit.messageHandlers.bridge.postMessage(
    { action: 'navigate', direction: direction });
}

function doJumpTo(tocEntryIndex) {
  window.webkit.messageHandlers.bridge.postMessage(
    { action: 'jumpTo', tocEntryIndex: tocEntryIndex });
}

function setActiveTocIndex(i) {
  document.querySelectorAll('.toc-item').forEach(function(el, idx) {
    el.classList.toggle('active', idx === i);
  });
}
window.setActiveTocIndex = setActiveTocIndex;

function injectObserver(iframe, tocAnchors) {
  if (!tocAnchors || !tocAnchors.length) return;
  var doc = iframe.contentDocument;
  if (!doc) return;
  var targets = tocAnchors
    .map(function(a) { return { el: doc.getElementById(a.id), tocIndex: a.tocIndex }; })
    .filter(function(a) { return !!a.el; });
  if (!targets.length) return;

  var observer = new IntersectionObserver(function(entries) {
    var visible = entries
      .filter(function(e) { return e.isIntersecting; })
      .sort(function(a, b) { return a.boundingClientRect.top - b.boundingClientRect.top; });
    if (visible.length > 0) {
      var target = visible[0].target;
      var match = targets.find(function(a) { return a.el === target; });
      if (match) window.setActiveTocIndex(match.tocIndex);
    }
  }, { threshold: 0.1 });

  targets.forEach(function(a) { observer.observe(a.el); });
}

function loadBook(data) {
  _toc        = data.toc || [];
  _spineCount = data.spineCount;
  document.getElementById('book-title').textContent = data.title || '';

  var list = document.getElementById('toc-list');
  list.innerHTML = '';
  _toc.forEach(function(entry, idx) {
    var div = document.createElement('div');
    div.className = 'toc-item';
    div.style.paddingLeft = (14 + entry.depth * 12) + 'px';
    div.textContent = entry.title;
    div.onclick = (function(i) {
      return function() { doJumpTo(i); };
    })(idx);
    list.appendChild(div);
  });

  navigateTo({
    spineIndex:     data.currentIndex,
    url:            data.currentUrl,
    activeTocIndex: data.activeTocIndex,
    tocAnchors:     data.tocAnchors || []
  });
}

function navigateTo(data) {
  _currentIndex = data.spineIndex;
  var frame = document.getElementById('content-frame');
  frame.src = data.url;
  document.getElementById('position').textContent =
    (_currentIndex + 1) + ' / ' + _spineCount;
  document.getElementById('prev-btn').disabled = (_currentIndex === 0);
  document.getElementById('next-btn').disabled = (_currentIndex === _spineCount - 1);

  var active = (data.activeTocIndex !== undefined) ? data.activeTocIndex : -1;
  setActiveTocIndex(active);

  var anchors = data.tocAnchors || [];
  frame.onload = anchors.length
    ? function() { injectObserver(frame, anchors); }
    : null;
}

window.webkit.messageHandlers.bridge.postMessage({ action: 'ready' });
</script>
</body>
</html>
